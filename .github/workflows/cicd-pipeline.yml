name: Enterprise QA CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:   # Allows manual trigger from GitHub UI

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  # STAGE 1: Fast feedback on every PR
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint (ruff)
        run: ruff check .

      - name: Formatting check (black)
        run: black --check .

      - name: Type checking (mypy)
        run: mypy . --ignore-missing-imports || echo "Type warnings (configure later)"

      - name: Unit Tests
        run: |
          pytest tests/unit -q --cov=src --cov-report=term-missing --cov-fail-under=85

  # STAGE 2: LLM + Feature Tests (critical quality gate)
  feature-and-llm-tests:
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run LLM Evaluations + Feature Tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pytest tests/llm tests/feature -q --cov=src --cov-report=term-missing

  # STAGE 3: UI/UX Tests (placeholder - ready for Playwright)
